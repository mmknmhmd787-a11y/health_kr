<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة وزارة الصحة | KR</title>
    <style>
        :root {
            --primary-gold: #c5a059;
            --header-bg: #000000; /* الجزء العلوي أسود */
            --content-bg: #ffffff; /* خلفية الخيارات بيضاء */
        }
        
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--content-bg); /* الخلفية الأساسية بيضاء */
            display: flex; flex-direction: column; align-items: center;
        }

        /* تنسيق الجزء العلوي الأسود */
        .header { 
            background-color: var(--header-bg); 
            width: 100%; 
            padding: 40px 0; 
            text-align: center; 
            color: white;
            border-bottom: 4px solid var(--primary-gold);
            border-radius: 0 0 30px 30px; /* انحناء بسيط في الأسفل */
        }
        
        .header h1 { color: var(--primary-gold); margin: 10px 0; font-size: 1.6rem; }
        .sub-text { color: #ccc; font-size: 0.9rem; max-width: 85%; margin: 0 auto; line-height: 1.5; }

        /* حاوية الخيارات */
        .menu-container { 
            width: 92%; 
            max-width: 500px; 
            margin-top: -20px; /* لرفع الخيارات قليلاً فوق الانحناء */
            padding-bottom: 40px;
        }
        
        .menu-item {
            background-color: #ffffff;
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #333;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); /* ظل ناعم ليبرز فوق الأبيض */
            transition: 0.3s;
            border: 1px solid #eee;
        }

        .menu-item:hover { transform: translateY(-5px); border-color: var(--primary-gold); }

        /* دائرة الأيقونة الفاتحة */
        .icon-circle {
            width: 55px;
            height: 55px;
            background-color: #f0f2f5; 
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: 15px;
        }
        .icon-circle svg { width: 28px; height: 28px; fill: #4a5568; }

        .menu-text-container { flex-grow: 1; text-align: right; }
        .main-text { display: block; font-size: 1.1rem; font-weight: bold; color: #1a1a1a; }
        .sub-desc { display: block; font-size: 0.85rem; color: #777; }
        
        .arrow { color: var(--primary-gold); font-size: 1.2rem; margin-right: 5px; }
    </style>
</head>
