            margin-bottom: 15px;
            padding: 15px 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .menu-item:hover { transform: translateY(-3px); background-color: #252525; }

        /* دائرة الأيقونة */

            width: 50px;
            height: 50px;
            background-color: #f8f9fa; /* لون خلفية فاتح للأيقونة مثل الصورة */

            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: 15px; /* مسافة بين الأيقونة والنص */
        }
        .icon-circle svg { width: 25px; height: 25px; fill: #4a5568; }

        .menu-text { flex-grow: 1; font-size: 1.1rem; font-weight: 500; text-align: right; }
        .arrow { color: #888; font-size: 1.2rem; margin-right: 10px; }
