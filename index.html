<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة وزارة الصحة - KR MOH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-pink: #d81b60;
            --soft-pink: #fdf2f5;
            --text-dark: #3d1f28;
            --bg-gradient: linear-gradient(180deg, #f8c8d3 0%, #f9e1e7 100%);
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-gradient); min-height: 100vh; color: var(--text-dark);
        }

        .header-section { text-align: center; padding: 50px 20px 30px; }
        .header-section h1 { font-size: 2.2rem; margin: 0; font-weight: bold; }

        .container { max-width: 450px; margin: 0 auto; padding: 0 20px 50px; }

        /* البطاقات الأساسية */
        .card {
            background-color: #fff; border-radius: 25px; padding: 25px;
            margin-bottom: 20px; text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03); cursor: pointer; transition: 0.3s;
        }
        .card:active { transform: scale(0.95); }
        .icon-circle {
            width: 60px; height: 60px; background-color: var(--soft-pink);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px; color: var(--primary-pink); font-size: 24px;
        }

        /* --- النافذة المنبثقة المدمجة --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(61, 31, 40, 0.4); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-overlay.active { display: flex; }

        .modal-content {
            background: #fff; width: 85%; max-width: 380px;
            border-radius: 35px; padding: 25px; position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15); overflow: hidden;
        }

        /* حاويات القوائم داخل المودال */
        .menu-view { display: block; }
        .leadership-view { display: none; }

        .modal-header { 
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; border-bottom: 2px solid var(--soft-pink); padding-bottom: 10px;
        }
        .modal-header h3 { margin: 0; color: var(--primary-pink); }

        .close-btn, .back-menu-btn {
            font-size: 18px; cursor: pointer; color: #a0888f;
            background: #f5f5f5; width: 35px; height: 35px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }

        .modal-item, .leader-item {
            padding: 12px 15px; border-radius: 15px; background: #fafafa;
            display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
            cursor: pointer; transition: 0.2s;
        }
        .modal-item:hover, .leader-item:hover { background: var(--soft-pink); transform: translateX(-5px); }
        .modal-item i, .leader-item i { color: var(--primary-pink); width: 20px; text-align: center; }

        .leader-item { cursor: default; } /* القادة لا يحتاجون نقر حالياً */
        .leader-info h4 { margin: 0; font-size: 1rem; }
        .leader-info p { margin: 2px 0 0; font-size: 0.8rem; color: #a0888f; }

        /* السلايدر السفلي */
        .slider-container {
            position: relative; max-width: 100%; margin-top: 25px;
            overflow: hidden; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .slides { display: flex; transition: transform 0.5s ease-in-out; width: 100%; }
        .slides img { width: 100%; flex: 0 0 100%; object-fit: cover; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.9); border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 10; }
        .btn-prev { right: 10px; } .btn-next { left: 10px; }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>وزارة الصحة</h1>
        <p>KR MOH</p>
    </div>

    <div class="container">
        <div class="card"><div class="icon-circle"><i class="fa-regular fa-file-lines"></i></div><h3>التقديم الإلكتروني</h3></div>
        <div class="card"><div class="icon-circle"><i class="fa-regular fa-calendar-check"></i></div><h3>حجز المواعيد</h3></div>
        
        <div class="card" onclick="openModal()">
            <div class="icon-circle"><i class="fa-regular fa-user"></i></div>
            <h3>من نحن</h3>
        </div>

        <div class="card"><div class="icon-circle"><i class="fa-solid fa-stethoscope"></i></div><h3>خدماتنا</h3></div>

        <div class="slider-container">
            <div class="slides" id="imgSlider">
                <img src="https://i.ibb.co/fV6Qw4Bc/image-12.png" alt="1">
                <img src="https://i.ibb.co/kgsxZyYr/image-9.png" alt="2">
                <img src="https://i.ibb.co/M5h2cDmj/image-14.png" alt="3">
            </div>
            <button class="nav-btn btn-prev" onclick="move(1)">❯</button>
            <button class="nav-btn btn-next" onclick="move(-1)">❮</button>
        </div>
    </div>

    <div class="modal-overlay" id="aboutModal">
        <div class="modal-content">
            
            <div id="mainMenuView" class="menu-view">
                <div class="modal-header">
                    <h3>عن الوزارة</h3>
                    <span class="close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></span>
                </div>
                <div class="modal-item" onclick="showLeadership()">
                    <i class="fa-solid fa-crown"></i>
                    <span>قيادة الوزارة</span>
                </div>
                <div class="modal-item"><i class="fa-solid fa-sitemap"></i><span>الهيكل التنظيمي</span></div>
                <div class="modal-item"><i class="fa-solid fa-landmark"></i><span>تاريخ الوزارة</span></div>
                <div class="modal-item"><i class="fa-solid fa-bullseye"></i><span>أهداف الوزارة</span></div>
            </div>

            <div id="leadershipView" class="leadership-view">
                <div class="modal-header">
                    <span class="back-menu-btn" onclick="showMainMenu()"><i class="fa-solid fa-arrow-right"></i></span>
                    <h3>القيادة العليا</h3>
                    <span class="close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></span>
                </div>
                <div class="leader-item">
                    <i class="fa-solid fa-user-tie"></i>
                    <div class="leader-info"><h4>امين الجوبري</h4><p>وزير الصحة</p></div>
                </div>
                <div class="leader-item">
                    <i class="fa-solid fa-user-shield"></i>
                    <div class="leader-info"><h4>محمود</h4><p>نائب وزير الصحة</p></div>
                </div>
                <div class="leader-item">
                    <i class="fa-solid fa-user-gear"></i>
                    <div class="leader-info"><h4>عمار الهذلي</h4><p>مستشار وزير الصحة</p></div>
                </div>
                <div class="leader-item">
                    <i class="fa-solid fa-truck-medical"></i>
                    <div class="leader-info"><h4>هورس العربي</h4><p>مسؤول المسعفين</p></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function openModal() { document.getElementById('aboutModal').classList.add('active'); showMainMenu(); }
        function closeModal() { document.getElementById('aboutModal').classList.remove('active'); }
        
        function showLeadership() {
            document.getElementById('mainMenuView').style.display = 'none';
            document.getElementById('leadershipView').style.display = 'block';
        }

        function showMainMenu() {
            document.getElementById('leadershipView').style.display = 'none';
            document.getElementById('mainMenuView').style.display = 'block';
        }

        let idx = 0;
        function move(n) {
            const s = document.getElementById('imgSlider');
            idx = (idx + n + 3) % 3;
            s.style.transform = `translateX(${idx * 100}%)`;
        }
    </script>
</body>
</html>
