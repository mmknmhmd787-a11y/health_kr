<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة وزارة الصحة - KR MOH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(180deg, #f8c8d3 0%, #f9e1e7 100%); 
            min-height: 100vh;
            color: #4a2c34;
        }

        .header-section {
            text-align: center;
            padding: 50px 20px 30px;
        }

        .header-section h1 {
            font-size: 2.2rem;
            margin: 0;
            color: #3d1f28;
            font-weight: bold;
        }

        .header-section p {
            font-size: 1.1rem;
            opacity: 0.5;
            margin-top: 5px;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
            padding: 0 20px 50px;
        }

        /* تنسيق البطاقة البيضاء */
        .card {
            background-color: #fff;
            border-radius: 25px; 
            padding: 25px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            text-decoration: none;
            display: block;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #3d1f28;
            margin-bottom: 5px;
        }

        .card-desc {
            font-size: 0.9rem;
            color: #a0888f;
        }

        /* الأيقونة الخطية داخل الدائرة */
        .icon-circle {
            width: 60px;
            height: 60px;
            background-color: #fdf2f5;
            border-radius: 50%; /* دائرية تماماً مثل الصورة */
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: #d81b60; /* لون الأيقونة */
            font-size: 24px;
        }

        /* السلايدر السفلي */
        .slider-container {
            position: relative;
            max-width: 100%;
            margin-top: 20px;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .slides {
            display: flex;
            transition: transform 0.5s ease-in-out;
            width: 100%;
        }

        .slides img {
            width: 100%;
            flex: 0 0 100%;
            display: block;
            object-fit: cover;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.85);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
        }

        .btn-prev { right: 10px; }
        .btn-next { left: 10px; }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>وزارة الصحة</h1>
        <p>KR MOH</p>
    </div>

    <div class="container">
        
        <div class="card">
            <div class="icon-circle"><i class="fa-regular fa-file-lines"></i></div>
            <div class="card-title">التقديم الإلكتروني</div>
            <div class="card-desc">ابدأ طلبك الآن عبر البوابة</div>
        </div>

        <div class="card">
            <div class="icon-circle"><i class="fa-regular fa-calendar-check"></i></div>
            <div class="card-title">حجز المواعيد</div>
            <div class="card-desc">احجز موعدك بكل سهولة</div>
        </div>

        <div class="card">
            <div class="icon-circle"><i class="fa-regular fa-user"></i></div>
            <div class="card-title">من نحن</div>
            <div class="card-desc">تعرّف على الوزارة ورؤيتها</div>
        </div>

        <div class="card">
            <div class="icon-circle"><i class="fa-solid fa-stethoscope"></i></div>
            <div class="card-title">خدماتنا</div>
            <div class="card-desc">تصفح جميع الخدمات الصحية</div>
        </div>

        <div class="slider-container">
            <div class="slides" id="imgSlider">
                <img src="https://i.ibb.co/fV6Qw4Bc/image-12.png" alt="1">
                <img src="https://i.ibb.co/kgsxZyYr/image-9.png" alt="2">
                <img src="https://i.ibb.co/M5h2cDmj/image-14.png" alt="3">
            </div>
            <button class="nav-btn btn-prev" onclick="move(1)">❯</button>
            <button class="nav-btn btn-next" onclick="move(-1)">❮</button>
        </div>
    </div>

    <script>
        let idx = 0;
        function move(n) {
            const s = document.getElementById('imgSlider');
            const total = s.children.length;
            idx = (idx + n + total) % total;
            s.style.transform = `translateX(${idx * 100}%)`;
        }
    </script>

</body>
</html>
