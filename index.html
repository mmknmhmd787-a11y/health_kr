<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموقع الرسمي</title>
    <style>
        /* الخلفية المتدرجة زي الصورة */
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(180deg, #f8c8d3 0%, #f9e1e7 100%); 
            min-height: 100vh;
            color: #4a2c34;
        }

        /* الجزء العلوي (العنوان) */
        .header-section {
            text-align: center;
            padding: 60px 20px 40px;
        }

        .header-section h1 {
            font-size: 2.5rem;
            margin: 0;
            color: #3d1f28;
            font-weight: bold;
        }

        .header-section p {
            font-size: 1.2rem;
            opacity: 0.6;
            margin-top: 5px;
        }

        /* حاوية البطاقات */
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 20px 100px;
        }

        /* تصميم البطاقات البيضاء */
        .card {
            background-color: #fff;
            border-radius: 30px; /* زوايا دائرية كبيرة زي الصورة */
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: bold;
            color: #3d1f28;
            margin-bottom: 8px;
        }

        .card-desc {
            font-size: 0.95rem;
            color: #8a7077;
        }

        /* أيقونات بسيطة فوق النص */
        .icon-box {
            background-color: #fdf2f5;
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: #e91e63;
            font-size: 20px;
        }

        /* معرض الصور (السلايدر) في الأسفل */
        .footer-slider {
            margin-top: 30px;
            padding-bottom: 50px;
        }

        .slider-container {
            position: relative;
            max-width: 90%;
            margin: 0 auto;
            overflow: hidden;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .slides {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        .slides img {
            width: 100%;
            display: block;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.8);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            z-index: 5;
        }

        .btn-prev { right: 10px; }
        .btn-next { left: 10px; }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>وزارة الصحة</h1>
        <p>KR MOH</p>
    </div>

    <div class="container">
        <div class="card">
            <div class="icon-box">📝</div>
            <div class="card-title">التقديم الإلكتروني</div>
            <div class="card-desc">ابدأ طلبك الآن عبر البوابة</div>
        </div>

        <div class="card">
            <div class="icon-box">📅</div>
            <div class="card-title">حجز المواعيد</div>
            <div class="card-desc">احجز موعدك بكل سهولة</div>
        </div>

        <div class="card">
            <div class="icon-box">👤</div>
            <div class="card-title">من نحن</div>
            <div class="card-desc">تعرّف على الوزارة ورؤيتها</div>
        </div>

        <div class="card">
            <div class="icon-box">🏥</div>
            <div class="card-title">خدماتنا</div>
            <div class="card-desc">تصفح جميع الخدمات الصحية</div>
        </div>

        <div class="footer-slider">
            <div class="slider-container">
                <div class="slides" id="imgSlider">
                    <img src="https://i.ibb.co/fV6Qw4Bc/image-12.png" alt="1">
                    <img src="https://i.ibb.co/kgsxZyYr/image-9.png" alt="2">
                    <img src="https://i.ibb.co/M5h2cDmj/image-14.png" alt="3">
                </div>
                <button class="nav-btn btn-prev" onclick="move(1)">❯</button>
                <button class="nav-btn btn-next" onclick="move(-1)">❮</button>
            </div>
        </div>
    </div>

    <script>
        let idx = 0;
        function move(n) {
            const s = document.getElementById('imgSlider');
            const total = s.children.length;
            idx = (idx + n + total) % total;
            s.style.transform = `translateX(${idx * 100}%)`;
        }
    </script>

</body>
</html>
