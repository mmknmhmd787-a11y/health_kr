<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة وزارة الصحة | KR</title>
    <style>
        :root {
            --main-bg: #fce4ec; 
            --card-bg: #ffffff; 
            --accent-pink: #f8bbd0; 
            --text-dark: #4a154b; 
            --sub-text: #880e4f; 
        }
        
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--main-bg);
            display: flex; flex-direction: column; align-items: center;
        }

        .header { 
            width: 100%; 
            padding: 40px 0; 
            text-align: center; 
        }
        
        .header h1 { 
            color: var(--text-dark); 
            margin: 0; 
            font-size: 1.8rem; 
            font-weight: bold;
        }
        .header .sub-brand {
            color: var(--accent-pink);
            letter-spacing: 2px;
            font-size: 0.9rem;
            margin-top: 5px;
            display: block;
        }

        .menu-container { 
            width: 90%; 
            max-width: 450px; 
            margin-top: 10px; 
        }
        
        .menu-item {
            background-color: var(--card-bg);
            margin-bottom: 20px;
            padding: 20px;
            border-radius: 25px;
            display: flex;
            flex-direction: column; 
            align-items: center;
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03); 
            transition: 0.3s;
        }

        .icon-circle {
            width: 60px; height: 60px;
            background-color: #fff5f8; 
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 15px;
        }
        .icon-circle svg { width: 30px; height: 30px; fill: var(--accent-pink); }

        .menu-text-container { text-align: center; }
        .main-text { display: block; font-size: 1.2rem; font-weight: bold; color: var(--text-dark); }
        .sub-desc { display: block; font-size: 0.9rem; color: #9e9e9e; margin-top: 8px; }

        .slider-wrapper {
            width: 90%; max-width: 450px;
            margin: 20px 0 50px 0;
        }

        .slider-container {
            width: 100%;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            position: relative;
        }

        .slider-images {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slider-images img {
            width: 100%; flex-shrink: 0;
            aspect-ratio: 4 / 3;
            object-fit: cover;
        }

        .slider-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 45px; height: 45px;
            background-color: rgba(255, 255, 255, 0.9);
            border: none; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 10;
        }
        .prev-btn { left: 15px; } .next-btn { right: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>وزارة الصحة</h1>
        <span class="sub-brand">KR MOH</span>
    </div>

    <div class="menu-container">
        <a href="#" class="menu-item">
            <div class="icon-circle"><svg viewBox="0 0 24 24"><path d="M12,11.5A2.5,2.5 0 0,1 9.5,9A2.5,2.5 0 0,1 12,6.5A2.5,2.5 0 0,1 14.5,9A2.5,2.5 0 0,1 12,11.5M12,2A7,7 0 0,0 5,9C5,14.25 12,22 12,22C12,22 19,14.25 19,9A7,7 0 0,0 12,2Z"/></svg></div>
            <div class="menu-text-container">
                <span class="main-text">التقديم الإلكتروني</span>
                <span class="sub-desc">انضم لكوادرنا الآن</span>
            </div>
        </a>

        <a href="#" class="menu-item">
            <div class="icon-circle"><svg viewBox="0 0 24 24"><path d="M19,19H5V8H19M16,1V3H8V1H6V3H5C3.89,3 3,3.9 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V5C21,3.9 20.1,3 19,3H18V1M17,12H12V17H17V12Z"/></svg></div>
            <div class="menu-text-container">
                <span class="main-text">المواعيد</span>
                <span class="sub-desc">احجز موعدك بسهولة</span>
            </div>
        </a>

        <a href="#" class="menu-item">
            <div class="icon-circle"><svg viewBox="0 0 24 24"><path d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z"/></svg></div>
            <div class="menu-text-container">
                <span class="main-text">من نحن</span>
                <span class="sub-desc">تعرّف على الوزارة ورؤيتها</span>
            </div>
        </a>

        <a href="#" class="menu-item">
            <div class="icon-circle"><svg viewBox="0 0 24 24"><path d="M13,9.5H11V7.5H13V9.5M13,16.5H11V11.5H13V16.5M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2Z"/></svg></div>
            <div class="menu-text-container">
                <span class="main-text">خدماتنا</span>
                <span class="sub-desc">تصفح جميع الخدمات الصحية</span>
            </div>
        </a>
    </div>

    <div class="slider-wrapper">
        <div class="slider-container">
            <div class="slider-images" id="slider">
                <img src="1.png" alt="1">
                <img src="2.png" alt="2">
                <img src="3.png" alt="3">
                <img src="4.png" alt="4">
            </div>
            <button class="slider-btn prev-btn" onclick="moveSlider(-1)">❮</button>
            <button class="slider-btn next-btn" onclick="moveSlider(1)">❯</button>
        </div>
    </div>

    <script>
        let currentIndex = 0;
        const slider = document.getElementById('slider');
        function moveSlider(dir) {
            currentIndex = (currentIndex + dir + 4) % 4;
            slider.style.transform = `translateX(${currentIndex * 100}%)`;
        }
    </script>

</body>
</html>
