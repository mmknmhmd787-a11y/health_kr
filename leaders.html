<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قيادة وزارة الصحة - KR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-pink: #d81b60;
            --soft-pink: #fdf2f5;
            --text-dark: #3d1f28;
            --bg-gradient: linear-gradient(180deg, #f8c8d3 0%, #f9e1e7 100%);
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-gradient); min-height: 100vh; color: var(--text-dark);
            padding: 20px;
        }

        .header {
            display: flex; align-items: center; justify-content: space-between;
            max-width: 450px; margin: 0 auto 25px; padding: 10px;
        }

        .back-btn {
            background: #fff; color: var(--primary-pink);
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .container { max-width: 450px; margin: 0 auto; }

        .leader-card {
            background: #fff; border-radius: 20px; padding: 15px 20px;
            display: flex; align-items: center; gap: 15px;
            margin-bottom: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .leader-icon {
            width: 50px; height: 50px; background: var(--soft-pink);
            border-radius: 15px; display: flex; align-items: center;
            justify-content: center; color: var(--primary-pink); font-size: 20px;
        }

        .leader-info h3 { margin: 0; font-size: 1.1rem; }
        .leader-info p { margin: 2px 0 0; font-size: 0.85rem; color: #888; }

        /* تمييز خاص للوزير */
        .minister { border-right: 5px solid var(--primary-pink); }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-right"></i></a>
        <h2 style="margin:0">قيادة الوزارة</h2>
        <div style="width:40px"></div>
    </div>

    <div class="container">
        
        <div class="leader-card minister">
            <div class="leader-icon"><i class="fa-solid fa-crown"></i></div>
            <div class="leader-info">
                <h3>أمين الجوبري</h3>
                <p>وزير الصحة</p>
            </div>
        </div>

        <div class="leader-card">
            <div class="leader-icon"><i class="fa-solid fa-user-shield"></i></div>
            <div class="leader-info">
                <h3>لا يوجد حالياً</h3>
                <p>نائب وزير الصحة</p>
            </div>
        </div>

        <div class="leader-card">
            <div class="leader-icon"><i class="fa-solid fa-user-gear"></i></div>
            <div class="leader-info">
                <h3>عمار الهذلي</h3>
                <p>مستشار وزير الصحة</p>
            </div>
        </div>

        <div class="leader-card">
            <div class="leader-icon"><i class="fa-solid fa-hospital-user"></i></div>
            <div class="leader-info">
                <h3>كريم السيد</h3>
                <p>مدير المستشفى</p>
            </div>
        </div>

        <div class="leader-card">
            <div class="leader-icon"><i class="fa-solid fa-truck-medical"></i></div>
            <div class="leader-info">
                <h3>هورس العربي</h3>
                <p>مسؤول المسعفين</p>
            </div>
        </div>

    </div>

</body>
</html>
