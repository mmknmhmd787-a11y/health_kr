<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة وزارة الصحة - KR MOH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-pink: #d81b60;
            --soft-pink: #fdf2f5;
            --text-dark: #3d1f28;
            --bg-gradient: linear-gradient(180deg, #f8c8d3 0%, #f9e1e7 100%);
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-gradient); 
            min-height: 100vh;
            color: var(--text-dark);
        }

        .header-section { text-align: center; padding: 50px 20px 30px; }
        .header-section h1 { font-size: 2.2rem; margin: 0; color: var(--text-dark); font-weight: bold; }
        .header-section p { font-size: 1.1rem; opacity: 0.5; margin-top: 5px; }

        .container { max-width: 450px; margin: 0 auto; padding: 0 20px 50px; }

        /* البطاقات الأساسية */
        .card {
            background-color: #fff;
            border-radius: 25px; 
            padding: 25px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card:active { transform: scale(0.95); }

        .card-title { font-size: 1.3rem; font-weight: bold; color: var(--text-dark); margin-bottom: 5px; }
        .card-desc { font-size: 0.9rem; color: #a0888f; }

        .icon-circle {
            width: 60px; height: 60px; background-color: var(--soft-pink);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; margin: 0 auto 15px;
            color: var(--primary-pink); font-size: 24px;
        }

        /* --- تصميم القائمة المنبثقة الجديد (Modern Popup) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(61, 31, 40, 0.4);
            backdrop-filter: blur(8px); /* تأثير الزجاج المضبب */
            display: none; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; transition: opacity 0.3s ease;
        }

        .modal-overlay.active { display: flex; opacity: 1; }

        .modal-content {
            background: #fff; width: 85%; max-width: 380px;
            border-radius: 35px; padding: 30px;
            position: relative; text-align: right;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            transform: translateY(30px); transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content { transform: translateY(0); }

        .close-btn {
            position: absolute; top: 20px; left: 20px; 
            font-size: 20px; cursor: pointer; color: #a0888f;
            background: #f5f5f5; width: 35px; height: 35px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .close-btn:hover { background: #eee; color: var(--primary-pink); }

        .modal-header { margin-bottom: 25px; border-bottom: 2px solid var(--soft-pink); padding-bottom: 15px; }
        .modal-header h3 { margin: 0; color: var(--primary-pink); font-size: 1.5rem; }

        .modal-list { display: flex; flex-direction: column; gap: 10px; }

        .modal-item {
            padding: 15px 20px; border-radius: 18px;
            background: #fafafa; display: flex; align-items: center;
            gap: 15px; transition: all 0.2s; cursor: pointer;
            border: 1px solid transparent;
        }
        .modal-item:hover { 
            background: var(--soft-pink); 
            border-color: var(--primary-pink);
            transform: translateX(-5px); 
        }
        .modal-item i { color: var(--primary-pink); font-size: 18px; width: 25px; text-align: center; }
        .modal-item span { font-weight: 600; font-size: 1.05rem; color: var(--text-dark); }

        /* السلايدر السفلي */
        .slider-container {
            position: relative; max-width: 100%; margin-top: 25px;
            overflow: hidden; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .slides { display: flex; transition: transform 0.5s ease-in-out; width: 100%; }
        .slides img { width: 100%; flex: 0 0 100%; display: block; object-fit: cover; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.9); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 10; font-size: 18px; }
        .btn-prev { right: 10px; } .btn-next { left: 10px; }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>وزارة الصحة</h1>
        <p>KR MOH</p>
    </div>

    <div class="container">
        <div class="card">
            <div class="icon-circle"><i class="fa-regular fa-file-lines"></i></div>
            <div class="card-title">التقديم الإلكتروني</div>
            <div class="card-desc">ابدأ طلبك الآن عبر البوابة</div>
        </div>

        <div class="card">
            <div class="icon-circle"><i class="fa-regular fa-calendar-check"></i></div>
            <div class="card-title">حجز المواعيد</div>
            <div class="card-desc">احجز موعدك بكل سهولة</div>
        </div>

        <div class="card" onclick="openModal()">
            <div class="icon-circle"><i class="fa-regular fa-user"></i></div>
            <div class="card-title">من نحن</div>
            <div class="card-desc">تعرّف على الوزارة ورؤيتها</div>
        </div>

        <div class="card">
            <div class="icon-circle"><i class="fa-solid fa-stethoscope"></i></div>
            <div class="card-title">خدماتنا</div>
            <div class="card-desc">تصفح جميع الخدمات الصحية</div>
        </div>

        <div class="slider-container">
            <div class="slides" id="imgSlider">
                <img src="https://i.ibb.co/fV6Qw4Bc/image-12.png" alt="1">
                <img src="https://i.ibb.co/kgsxZyYr/image-9.png" alt="2">
                <img src="https://i.ibb.co/M5h2cDmj/image-14.png" alt="3">
            </div>
            <button class="nav-btn btn-prev" onclick="move(1)">❯</button>
            <button class="nav-btn btn-next" onclick="move(-1)">❮</button>
        </div>
    </div>

    <div class="modal-overlay" id="aboutModal" onclick="closeModalOutside(event)">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></span>
            
            <div class="modal-header">
                <h3>عن الوزارة</h3>
            </div>

            <div class="modal-list">
                <div class="modal-item">
                    <i class="fa-solid fa-crown"></i>
                    <span>قيادة الوزارة</span>
                </div>
                <div class="modal-item">
                    <i class="fa-solid fa-sitemap"></i>
                    <span>الهيكل التنظيمي</span>
                </div>
                <div class="modal-item">
                    <i class="fa-solid fa-landmark"></i>
                    <span>تاريخ الوزارة</span>
                </div>
                <div class="modal-item">
                    <i class="fa-solid fa-bullseye"></i>
                    <span>أهداف الوزارة</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // دوال القائمة المنبثقة
        function openModal() { 
            const modal = document.getElementById('aboutModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
        }

        function closeModal() { 
            const modal = document.getElementById('aboutModal');
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        function closeModalOutside(e) {
            if (e.target.id === 'aboutModal') closeModal();
        }

        // دوال السلايدر
        let idx = 0;
        function move(n) {
            const s = document.getElementById('imgSlider');
            const total = s.children.length;
            idx = (idx + n + total) % total;
            s.style.transform = `translateX(${idx * 100}%)`;
        }
    </script>

</body>
</html>
